<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여행 계획 마법사</title>
<style>
  :root {
    --primary: #2563eb; --primary-light: #eff6ff; --primary-dark: #1d4ed8;
    --accent: #f59e0b; --success: #10b981; --danger: #ef4444; --purple: #7c3aed;
    --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
    --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151; --gray-800: #1f2937;
    --radius: 12px; --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }
  .app-header { background: white; border-bottom: 1px solid var(--gray-200); padding: 16px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .app-header h1 { font-size: 18px; font-weight: 700; }
  .badge { background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .main { max-width: 780px; margin: 0 auto; padding: 28px 16px 80px; }

  /* Progress */
  .progress-bar { display: flex; align-items: center; margin-bottom: 28px; background: white; border-radius: var(--radius); padding: 14px 18px; box-shadow: var(--shadow); overflow-x: auto; gap: 0; }
  .step-dot { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; min-width: 54px; cursor: pointer; }
  .step-dot .circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--gray-300); background: white; color: var(--gray-400); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .step-dot.active .circle { border-color: var(--primary); background: var(--primary); color: white; }
  .step-dot.done .circle { border-color: var(--success); background: var(--success); color: white; }
  .step-dot .label { font-size: 10px; color: var(--gray-500); text-align: center; white-space: nowrap; }
  .step-dot.active .label { color: var(--primary); font-weight: 700; }
  .step-dot.done .label { color: var(--success); }
  .step-connector { height: 2px; flex: 1; background: var(--gray-200); margin-bottom: 16px; min-width: 8px; }
  .step-connector.done { background: var(--success); }

  /* Card */
  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 26px; margin-bottom: 16px; animation: fadeIn .22s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .card-title { font-size: 19px; font-weight: 700; margin-bottom: 5px; }
  .card-desc { font-size: 13px; color: var(--gray-500); margin-bottom: 22px; line-height: 1.6; }

  /* Form */
  .form-group { margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 5px; }
  label .opt { font-weight: 400; color: var(--gray-400); margin-left: 4px; }
  input[type=text], input[type=date], input[type=time], input[type=number], textarea, select { width: 100%; padding: 9px 13px; border: 1.5px solid var(--gray-200); border-radius: 8px; font-size: 14px; color: var(--gray-800); transition: border-color .15s; background: white; font-family: inherit; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--primary); }
  textarea { resize: vertical; min-height: 70px; }
  .hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

  /* Buttons */
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; font-family: inherit; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: white; color: var(--gray-700); border: 1.5px solid var(--gray-200); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #059669; }
  .btn-purple { background: var(--purple); color: white; }
  .btn-purple:hover { background: #6d28d9; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-xs { padding: 4px 9px; font-size: 11px; border-radius: 6px; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--gray-100); }
  .add-btn { display: flex; align-items: center; gap: 8px; border: 2px dashed var(--gray-300); background: white; border-radius: 10px; padding: 13px; width: 100%; cursor: pointer; color: var(--gray-500); font-size: 14px; font-weight: 600; transition: all .15s; font-family: inherit; }
  .add-btn:hover { border-color: var(--primary); color: var(--primary); }

  /* Info boxes */
  .info-box { background: var(--primary-light); border-left: 4px solid var(--primary); border-radius: 0 8px 8px 0; padding: 11px 15px; font-size: 13px; color: var(--gray-700); margin-bottom: 16px; }
  .warn-box { background: #fffbeb; border-left: 4px solid var(--accent); border-radius: 0 8px 8px 0; padding: 11px 15px; font-size: 13px; color: var(--gray-700); margin-bottom: 16px; }

  /* ── INTRO STEP ── */
  .intro-decide-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 24px 0; }
  .intro-decide-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    padding: 28px 16px; border-radius: 14px; border: 2px solid var(--gray-200);
    background: white; cursor: pointer; transition: all .2s; font-family: inherit;
    text-align: center;
  }
  .intro-decide-btn:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(37,99,235,.12); transform: translateY(-2px); }
  .intro-decide-btn .big-emoji { font-size: 36px; line-height: 1; }
  .intro-decide-btn .btn-label { font-size: 16px; font-weight: 700; color: var(--gray-800); }
  .intro-decide-btn .btn-sub { font-size: 12px; color: var(--gray-500); }
  .intro-decide-btn.yes { border-color: var(--success); background: #f0fdf4; }
  .intro-decide-btn.yes .btn-label { color: var(--success); }

  .q-step-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .q-step-num { background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .q-step-title { font-size: 17px; font-weight: 700; }
  .q-step-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }

  .q-options { display: grid; gap: 12px; margin: 18px 0; }
  .q-options.col2 { grid-template-columns: 1fr 1fr; }
  .q-options.col4 { grid-template-columns: 1fr 1fr; }
  .q-card {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; border: 2px solid var(--gray-200); border-radius: 12px;
    background: white; cursor: pointer; transition: all .18s; font-family: inherit; text-align: left;
  }
  .q-card:hover { border-color: var(--primary); background: var(--primary-light); }
  .q-card .q-emoji { font-size: 28px; flex-shrink: 0; }
  .q-card .q-text { display: flex; flex-direction: column; gap: 2px; }
  .q-card .q-label { font-size: 15px; font-weight: 700; color: var(--gray-800); }
  .q-card .q-sub { font-size: 12px; color: var(--gray-500); }

  .q-back-btn { display: flex; align-items: center; gap: 5px; background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 13px; font-family: inherit; padding: 0; margin-bottom: 20px; }
  .q-back-btn:hover { color: var(--primary); }

  /* Category result */
  .cat-result-header { text-align: center; padding: 24px 0 18px; }
  .cat-result-emoji { font-size: 48px; margin-bottom: 8px; }
  .cat-result-name { font-size: 20px; font-weight: 800; color: var(--gray-800); margin-bottom: 5px; }
  .cat-result-tag { display: inline-block; background: var(--primary-light); color: var(--primary); font-size: 12px; font-weight: 600; padding: 3px 12px; border-radius: 20px; margin-bottom: 10px; }
  .cat-result-desc { font-size: 14px; color: var(--gray-600); }
  .city-rec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
  .city-rec-card { border: 1.5px solid var(--gray-200); border-radius: 12px; padding: 16px; text-align: left; transition: all .18s; }
  .city-rec-card:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(37,99,235,.1); }
  .city-rec-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .city-rec-emoji { font-size: 22px; }
  .city-rec-name { font-size: 15px; font-weight: 700; }
  .city-rec-flag { font-size: 16px; }
  .city-rec-desc { font-size: 12px; color: var(--gray-500); margin-bottom: 12px; line-height: 1.5; }
  .city-pick-btn { display: block; width: 100%; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s; }
  .city-pick-btn:hover { background: var(--primary-dark); }
  .cat-retry-btn { display: block; text-align: center; width: 100%; margin-top: 10px; padding: 10px; border: 1.5px solid var(--gray-200); border-radius: 8px; background: white; color: var(--gray-600); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .cat-retry-btn:hover { border-color: var(--primary); color: var(--primary); }

  /* Place cards */
  .place-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .place-item { border: 1.5px solid var(--gray-200); border-radius: 10px; padding: 14px; background: var(--gray-50); }
  .place-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .place-name-badge { background: var(--primary); color: white; font-size: 12px; font-weight: 700; padding: 3px 11px; border-radius: 20px; }
  .place-type-tag { font-size: 11px; padding: 2px 9px; border-radius: 20px; border: 1px solid var(--gray-200); color: var(--gray-600); background: white; }
  .place-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; color: var(--gray-500); }
  .place-remove { margin-left: auto; background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 17px; padding: 2px 5px; }
  .place-remove:hover { color: var(--danger); }
  .zone-section { margin-bottom: 20px; }
  .zone-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 2px solid var(--gray-200); }
  .zone-label { font-size: 14px; font-weight: 700; color: var(--gray-700); }
  .zone-count { background: var(--gray-200); color: var(--gray-600); font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }

  /* Rec panel */
  .rec-place-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .rec-place-card { border: 1.5px solid var(--gray-200); border-radius: 9px; padding: 11px; cursor: pointer; transition: all .15s; position: relative; }
  .rec-place-card:hover { border-color: var(--primary); }
  .rec-place-card.selected { border-color: var(--primary); background: var(--primary-light); }
  .rec-place-card .check { position: absolute; top: 8px; right: 8px; width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--gray-300); background: white; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .rec-place-card.selected .check { background: var(--primary); border-color: var(--primary); color: white; }
  .rec-place-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; padding-right: 22px; }
  .rec-place-meta { font-size: 11px; color: var(--gray-500); line-height: 1.6; }

  /* Schedule */
  .day-block { margin-bottom: 20px; border: 1.5px solid var(--gray-200); border-radius: 10px; overflow: hidden; }
  .day-header { background: var(--primary); color: white; padding: 10px 15px; font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .day-note-tag { font-size: 11px; font-weight: 400; opacity: .85; }
  .day-explanation { background: #f8faff; border-bottom: 1px solid var(--gray-100); padding: 9px 13px; }
  .day-exp-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .day-exp-list li { font-size: 12px; color: var(--gray-600); }
  .schedule-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--gray-100); }
  .schedule-item:last-child { border-bottom: none; }
  .schedule-item:hover { background: var(--gray-50); }
  .sched-info { flex: 1; }
  .sched-name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .sched-sub { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
  .sched-move { display: flex; gap: 4px; flex-shrink: 0; }

  /* Type badges */
  .type-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
  .type-식사 { background: #fef3c7; color: #92400e; }
  .type-카페 { background: #ecfdf5; color: #065f46; }
  .type-명소 { background: #eff6ff; color: #1e40af; }
  .type-쇼핑 { background: #fdf4ff; color: #7e22ce; }
  .type-숙소 { background: #f0fdf4; color: #166534; }
  .type-이동 { background: #f8fafc; color: #475569; }
  .type-기타 { background: var(--gray-100); color: var(--gray-600); }

  /* Output */
  .output-summary { background: var(--gray-50); border-radius: 10px; padding: 14px; margin-bottom: 16px; font-size: 13px; }
  .output-summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; color: var(--gray-700); }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--gray-50); font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .03em; padding: 8px 11px; text-align: left; border-bottom: 1px solid var(--gray-200); }
  td { padding: 10px 11px; font-size: 13px; border-bottom: 1px solid var(--gray-100); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .place-cell { font-weight: 600; font-size: 13px; }
  .booking-links { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .booking-btn { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 600; text-decoration: none; }
  .tips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
  .tip-card { background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 8px; padding: 12px; }
  .tip-card h4 { font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--gray-700); }
  .tip-card p { font-size: 13px; color: var(--gray-600); line-height: 1.6; }
  .export-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

  @media (max-width: 600px) {
    .form-row, .rec-place-grid, .tips-grid, .output-summary-grid, .intro-decide-grid, .q-options.col2, .q-options.col4, .city-rec-grid { grid-template-columns: 1fr; }
    .card { padding: 16px; }
    .btn-row { flex-wrap: wrap; }
  }
  @media print {
    .app-header, .progress-bar, .btn-row, .export-row, .sched-move { display: none; }
    .card { box-shadow: none; border: 1px solid var(--gray-200); break-inside: avoid; }
    body { background: white; }
  }
</style>
</head>
<body>

  <span style="font-size:22px">🗺️</span>
  <h1>여행 계획 마법사</h1>

</header>
<main class="main">
  <div class="progress-bar" id="progressBar"></div>
  <div id="stepContainer"></div>
</main>

function getCategory(flight, style, duration) {
  if (duration === '30days') return CATEGORIES[7];
  if (flight === 'short') {
    if (style === 'city') return duration === '3days' ? CATEGORIES[0] : CATEGORIES[1];
    return CATEGORIES[2];
  } else {
    if (style === 'city') return (duration === '3days' || duration === '7days') ? CATEGORIES[3] : CATEGORIES[5];
    return duration === '14days' ? CATEGORIES[6] : CATEGORIES[4];
  }
}

function getBookingLinks(place, destination) {
  const q = encodeURIComponent(place.name);
  const qf = encodeURIComponent(place.name + ' ' + destination);
  const links = [
    { label:'구글맵', url:`https://www.google.com/maps/search/?api=1&query=${qf}`, bg:'#4285F4', fg:'#fff' },
    { label:'네이버지도', url:`https://map.naver.com/p/search/${q}`, bg:'#03C75A', fg:'#fff' },
  ];
  if (place.type === '명소') {
    links.push({ label:'Klook', url:`https://www.klook.com/ko/search/?query=${qf}`, bg:'#FF5D1E', fg:'#fff' });
    links.push({ label:'KKday', url:`https://www.kkday.com/ko/search?q=${qf}`, bg:'#F74600', fg:'#fff' });
  }
  if (place.type === '식사') links.push({ label:'트립어드바이저', url:`https://www.tripadvisor.co.kr/Search?q=${qf}`, bg:'#34E0A1', fg:'#000' });
  if (place.type === '숙소') {
    links.push({ label:'부킹닷컴', url:`https://www.booking.com/search.html?ss=${qf}`, bg:'#003580', fg:'#fff' });
    links.push({ label:'Agoda', url:`https://www.agoda.com/search?q=${qf}`, bg:'#5392EB', fg:'#fff' });
  }
  const city = findMatchingCity(destination);
  if (city && ['kr'].includes(CITY_DATA[city]?.country) && (place.type === '카페' || place.type === '식사'))
    links.push({ label:'카카오맵', url:`https://map.kakao.com/?q=${q}`, bg:'#FAE100', fg:'#3C1E1E' });
  return links;
}

//  HELPERS
// ═══════════════════════════════════════════════
function v(id) { const e = document.getElementById(id); return e ? e.value : ''; }
function dateRange(start, end) {
  const dates = [];
  for (let d = new Date(start); d <= new Date(end); d.setDate(d.getDate()+1)) dates.push(d.toISOString().slice(0,10));
  return dates;
}
function formatDate(s) {
  if (!s) return '';
  const d = new Date(s), days=['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
}
function getDayLabel(date, i, total) {
  const base = `${i+1}일차 — ${formatDate(date)}`;
  if (i===0) return base+' · 도착일';
  if (i===total-1) return base+' · 귀국일';
  return base;
}
function findMatchingCity(dest) {
  if (!dest) return null;
  return Object.keys(CITY_DATA).find(c => dest.includes(c) || c.includes(dest)) || null;
}
function bestTimeOrder(bt) {
  return {'오전 (9~12시)':0,'낮 (12~14시)':1,'오후 (14~17시)':2,'저녁 (17~20시)':3,'야간 (20시~)':4,'상관없음':5}[bt] ?? 5;
}

// ═══════════════════════════════════════════════
//  SMART SCHEDULE
// ═══════════════════════════════════════════════
function buildSchedule() {
  const dates = dateRange(state.trip.startDate, state.trip.endDate);
  const total = dates.length;
  state.schedule = dates.map(date => ({ date, items:[], explanation:[] }));
  if (state.trip.arrivalTime && total > 0)
    state.schedule[0].items.push({ type:'fixed', time:state.trip.arrivalTime, name:'현지 도착', placeType:'이동' });
  if (state.trip.returnDepartureTime && total > 0)
    state.schedule[total-1].items.push({ type:'fixed', time:state.trip.returnDepartureTime, name:'공항 출발 (귀국)', placeType:'이동' });
  const toSchedule = state.places.filter(p => p.type !== '숙소');
  const zones = {};
  toSchedule.forEach(p => { const z=p.zone||'미분류'; if(!zones[z]) zones[z]=[]; zones[z].push(p); });
  const zoneList = Object.entries(zones).sort((a,b) => b[1].length-a[1].length);
  const capacity = dates.map((_,i) => (i===0&&state.trip.arrivalTime)||(i===total-1&&state.trip.returnDepartureTime) ? 3 : 6);
  const dayPlaces = dates.map(() => []);
  const dayUsed = dates.map(() => 0);
  let dayPtr = (state.trip.arrivalTime && total > 1) ? 1 : 0;
  zoneList.forEach(([,places]) => {
    let bestDay = dayPtr;
    for (let i=dayPtr; i<total; i++) { if (dayUsed[i]+places.length<=capacity[i]) { bestDay=i; break; } bestDay=i; }
    [...places].sort((a,b)=>bestTimeOrder(a.bestTime)-bestTimeOrder(b.bestTime)).forEach(p => {
      const day = dayUsed[bestDay]<capacity[bestDay] ? bestDay : Math.min(bestDay+1,total-1);
      dayPlaces[day].push(p); dayUsed[day]++;
    });
    if (dayUsed[dayPtr]>=capacity[dayPtr] && dayPtr<total-1) dayPtr++;
  });
  dayPlaces.forEach((places, di) => {
    const expl=[], zones=[...new Set(places.map(p=>p.zone||'미분류'))];
    if (zones.length===1 && places.length>1) expl.push(`📍 ${zones[0]} 집중 동선 — 걸어서 이동 가능`);
    else if (zones.length>1) expl.push(`📍 ${zones.join(' → ')} 순서로 이동`);
    const mp=places.filter(p=>p.bestTime?.includes('오전')), np=places.filter(p=>p.bestTime?.includes('야간')||p.bestTime?.includes('저녁'));
    if (mp.length) expl.push(`🌅 ${mp.map(p=>p.name).join(', ')} — 오전 방문 시 대기 적음`);
    if (np.length) expl.push(`🌙 ${np.map(p=>p.name).join(', ')} — 저녁·야경 분위기 최적`);
    const rp=places.filter(p=>p.needReservation);
    if (rp.length) expl.push(`📌 사전 예약 필요: ${rp.map(p=>p.name).join(', ')}`);
    if (di===0&&state.trip.arrivalTime) expl.push(`✈️ 도착 후 일정 — 체력 고려 가벼운 코스`);
    if (di===state.schedule.length-1&&state.trip.returnDepartureTime) expl.push(`🛫 귀국일 — 공항 출발 기준 오전·낮 일정`);
    state.schedule[di].explanation=expl;
    places.forEach(p => state.schedule[di].items.push({ type:'place', placeId:p.id, name:p.name, placeType:p.type, zone:p.zone, duration:p.duration, bestTime:p.bestTime, menu:p.menu, nearStation:p.nearStation, needReservation:p.needReservation, reservationMethod:p.reservationMethod, notes:p.notes }));
    state.schedule[di].items.sort((a,b) => { if(a.type==='fixed') return -1; if(b.type==='fixed') return 1; return bestTimeOrder(a.bestTime)-bestTimeOrder(b.bestTime); });
  });
}

function renderProgress() {
  document.getElementById('progressBar').innerHTML = STEPS.map((s,i) => {
    const cls = i<state.currentStep?'done':i===state.currentStep?'active':'';
    const icon = i<state.currentStep?'✓':i+1;
    return `<div class="step-dot ${cls}" onclick="goStep(${i})"><div class="circle">${icon}</div><div class="label">${s.label}</div></div>`
      + (i<STEPS.length-1 ? `<div class="step-connector ${i<state.currentStep?'done':''}"></div>` : '');
  }).join('');
}
function goStep(i) { if(i<=state.currentStep){ state.currentStep=i; if(i===0) state.intro.phase='decide'; render(); } }
function nextStep() { state.currentStep=Math.min(state.currentStep+1,STEPS.length-1); render(); scrollToTop(); }
function prevStep() { state.currentStep=Math.max(state.currentStep-1,0); render(); scrollToTop(); }

    <div class="btn-row">
      <button class="btn btn-outline" onclick="prevStep()">← 이전</button>
      <button class="btn btn-primary" onclick="saveTripStep()">다음: 방문지 입력 →</button>
    </div>
  </div>`;
}

function saveTripStep() {
  const t = state.trip;
  t.destination=v('destination'); t.startDate=v('startDate'); t.endDate=v('endDate');
  t.arrivalTime=v('arrivalTime'); t.returnDepartureTime=v('returnDepartureTime');
  t.accommodation=v('accommodation'); t.transport=v('transport'); t.notes=v('tripNotes');
  if (!t.destination||!t.startDate||!t.endDate) { alert('여행지·출발일·귀국일은 필수입니다.'); return; }
  if (new Date(t.endDate)<new Date(t.startDate)) { alert('귀국일이 출발일보다 빠릅니다.'); return; }
  nextStep();
}

// ═══════════════════════════════════════════════
//  STEP 2 — PLACES
// ═══════════════════════════════════════════════
function renderPlacesStep() {
  const matchedCity = findMatchingCity(state.trip.destination);
  const byZone = {};
  state.places.forEach(p => { const z=p.zone||'미분류'; if(!byZone[z]) byZone[z]=[]; byZone[z].push(p); });
  let recBtn = matchedCity
    ? `<button class="btn btn-purple" onclick="showRecommendPanel('${matchedCity}')" style="margin-bottom:14px">✨ ${matchedCity} 인기 장소 추천 받기</button>`
    : `<div class="warn-box" style="margin-bottom:14px">✏️ 지원 도시: ${Object.keys(CITY_DATA).map(c=>CITY_DATA[c].emoji+c).join(' · ')}<br>여행지명에 도시 이름을 포함하면 추천 기능이 활성화됩니다.</div>`;
  let placeHtml = state.places.length === 0
    ? `<div style="text-align:center;color:var(--gray-400);padding:28px;font-size:14px">아직 장소가 없습니다.</div>`
    : Object.entries(byZone).map(([zone,places]) => `
      <div class="zone-section"><div class="zone-header"><span class="zone-label">📌 ${zone}</span><span class="zone-count">${places.length}곳</span></div>
      ${places.map(p=>renderPlaceCard(p)).join('')}</div>`).join('');
  return `
  <div class="card">
    <div class="card-title">📍 방문하고 싶은 장소</div>
    <div class="card-desc">가고 싶은 곳을 모두 추가하세요. 일정 배치는 자동으로 제안됩니다.</div>
    ${recBtn}
    <div class="place-list">${placeHtml}</div>
    <button class="add-btn" onclick="showPlaceModal(null)"><span style="font-size:18px">＋</span> 직접 장소 추가하기</button>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="prevStep()">← 이전</button>
      <button class="btn btn-primary" onclick="goToDetails()">다음: 여행 팁 →</button>
    </div>
  </div>`;
}

function renderPlaceCard(p) {
  return `
  <div class="place-item">
    <div class="place-item-header">
      <span class="place-name-badge">${p.name}</span>
      <span class="place-type-tag">${p.type}</span>
      ${p.needReservation?'<span class="place-type-tag" style="background:#fef3c7;color:#92400e">📌예약필요</span>':''}
      <button class="place-remove" onclick="removePlace(${p.id})">×</button>
    </div>
    <div class="place-meta">
      <div>📍 ${p.zone||'—'}</div><div>🚇 ${p.nearStation||'—'}</div>
      <div>⏱ ${p.duration?p.duration+'분':'—'}</div><div>🌞 ${p.bestTime||'—'}</div>
    </div>
    <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="showPlaceModal(state.places.find(x=>x.id===${p.id}))">수정</button>
  </div>`;
}

function removePlace(id) { if(confirm('삭제할까요?')){ state.places=state.places.filter(p=>p.id!==id); render(); } }
function goToDetails() { if(!state.places.length){ alert('장소를 최소 1개 추가해주세요.'); return; } nextStep(); }

// Recommendation panel
function showRecommendPanel(cityName) {
  const city = CITY_DATA[cityName]; if(!city) return;
  const existingNames = new Set(state.places.map(p=>p.name));
  const m = document.createElement('div');
  m.id='recModal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';
  const cards = city.places.map((p,i) => {
    const added = existingNames.has(p.name);
    return `<div class="rec-place-card${added?' selected':''}" id="rpc-${i}" onclick="${added?'':('toggleRec('+i+')')}" ${added?'style="opacity:.55;pointer-events:none"':''}>
      <div class="check" id="rck-${i}">${added?'✓':''}</div>
      <div class="rec-place-name">${p.name}</div>
      <div class="rec-place-meta"><span class="type-badge type-${p.type}">${p.type}</span> ${p.zone}<br>⏱ ${p.duration}분 · ${p.bestTime}${p.nearStation?'<br>🚇 '+p.nearStation:''}${p.menu?'<br>🍽 '+p.menu:''}${p.needReservation?'<br>📌 <strong>예약 필요</strong>':''}${p.notes?'<br>💬 '+p.notes:''}</div>
    </div>`;
  }).join('');
  m.innerHTML=`
  <div style="background:white;border-radius:14px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25)">
    <div style="padding:18px 22px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:white;z-index:1">
      <div><div style="font-size:16px;font-weight:700">${city.emoji} ${cityName} 인기 장소</div><div style="font-size:12px;color:var(--gray-500);margin-top:2px">추가할 장소를 선택하세요 (복수 선택 가능)</div></div>
      <button onclick="document.getElementById('recModal').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-400)">×</button>
    </div>
    <div style="padding:18px"><div class="rec-place-grid">${cards}</div></div>
    <div style="padding:14px 22px;border-top:1px solid var(--gray-200);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:white">
      <button class="btn btn-outline" onclick="document.getElementById('recModal').remove()">취소</button>
      <button class="btn btn-primary" onclick="addSelectedRec('${cityName}')">선택한 장소 추가</button>
    </div>
  </div>`;
  m.dataset.selected=JSON.stringify([]);
  document.body.appendChild(m);
}
function toggleRec(idx) {
  const m=document.getElementById('recModal'); let sel=JSON.parse(m.dataset.selected);
  const card=document.getElementById('rpc-'+idx), chk=document.getElementById('rck-'+idx);
  if(sel.includes(idx)){ sel=sel.filter(i=>i!==idx); card.classList.remove('selected'); chk.textContent=''; }
  else { sel.push(idx); card.classList.add('selected'); chk.textContent='✓'; }
  m.dataset.selected=JSON.stringify(sel);
}
function addSelectedRec(cityName) {
  const m=document.getElementById('recModal');
  JSON.parse(m.dataset.selected).forEach(idx => state.places.push({ id:newId(), ...CITY_DATA[cityName].places[idx] }));
  m.remove(); render();
}

// Place modal
let _ep=null;
function showPlaceModal(p) {
  _ep=p?{...p}:{id:newId(),name:'',type:'명소',zone:'',nearStation:'',duration:90,bestTime:'상관없음',menu:'',needReservation:false,reservationMethod:'',notes:''};
  const zones=[...new Set(state.places.map(x=>x.zone).filter(Boolean))];
  const m=document.createElement('div'); m.id='placeModal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';
  m.innerHTML=`
  <div style="background:white;border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:16px;font-weight:700">${_ep.name||'장소 추가'}</h3>
      <button onclick="closePlaceModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-400)">×</button>
    </div>
    <datalist id="zoneList">${zones.map(z=>`<option value="${z}">`).join('')}</datalist>
    <div class="form-group"><label>장소 이름 *</label><input type="text" id="pm-name" value="${_ep.name}" placeholder="예: 츠키지 시장"></div>
    <div class="form-row">
      <div class="form-group"><label>유형</label><select id="pm-type">${PLACE_TYPES.map(t=>`<option ${_ep.type===t?'selected':''}>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label>구역</label><input type="text" id="pm-zone" value="${_ep.zone}" list="zoneList" placeholder="예: 신주쿠권"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>가까운 역</label><input type="text" id="pm-station" value="${_ep.nearStation}" placeholder="예: 신주쿠역 동쪽출구"></div>
      <div class="form-group"><label>소요 시간 (분)</label><input type="number" id="pm-duration" value="${_ep.duration}" min="15" step="15"></div>
    </div>
    <div class="form-group"><label>추천 방문 시간대</label><select id="pm-bestTime">${BEST_TIMES.map(t=>`<option ${_ep.bestTime===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="form-group"><label>추천 메뉴·볼거리 <span class="opt">선택</span></label><input type="text" id="pm-menu" value="${_ep.menu}" placeholder="예: 연어덮밥, 말차 아이스크림"></div>
    <div class="form-group" style="display:flex;gap:8px;align-items:center">
      <input type="checkbox" id="pm-res" ${_ep.needReservation?'checked':''} style="width:auto;margin:0">
      <label for="pm-res" style="margin:0;font-size:14px;font-weight:400">예약 필요</label>
    </div>
    <div id="pm-res-group" class="form-group" ${_ep.needReservation?'':'style="display:none"'}>
      <label>예약 방법</label><input type="text" id="pm-resMethod" value="${_ep.reservationMethod}" placeholder="예: 공식 웹사이트, 네이버 예약">
    </div>
    <div class="form-group"><label>메모</label><textarea id="pm-notes">${_ep.notes}</textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline" onclick="closePlaceModal()">취소</button>
      <button class="btn btn-primary" onclick="savePlaceModal()">저장</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  document.getElementById('pm-res').addEventListener('change',function(){ document.getElementById('pm-res-group').style.display=this.checked?'':'none'; });
}
function closePlaceModal(){ document.getElementById('placeModal')?.remove(); }
function savePlaceModal(){
  const name=v('pm-name').trim(); if(!name){ alert('장소 이름을 입력해주세요.'); return; }
  const p={id:_ep.id,name,type:v('pm-type'),zone:v('pm-zone').trim()||'미분류',nearStation:v('pm-station'),duration:parseInt(v('pm-duration'))||60,bestTime:v('pm-bestTime'),menu:v('pm-menu'),needReservation:document.getElementById('pm-res').checked,reservationMethod:v('pm-resMethod'),notes:v('pm-notes')};
  const idx=state.places.findIndex(x=>x.id===p.id);
  if(idx>=0) state.places[idx]=p; else state.places.push(p);
  closePlaceModal(); render();
}

// ═══════════════════════════════════════════════
//  STEP 3 — TIPS
// ═══════════════════════════════════════════════
function renderDetailsStep() {
  return `
  <div class="card">
    <div class="card-title">🧳 여행 팁 정리</div>
    <div class="card-desc">현지 실용 정보를 입력하면 완성 일정표 하단에 함께 출력됩니다. 모두 선택 사항입니다.</div>
    <div class="form-group"><label>날씨 / 복장</label><input type="text" id="tip-weather" value="${state.tips.weather}" placeholder="예: 6월 도쿄 평균 26도, 우산 필수"></div>
    <div class="form-group"><label>환율 / 결제 수단</label><input type="text" id="tip-currency" value="${state.tips.currency}" placeholder="예: 1엔 ≈ 9원, 현금 필요"></div>
    <div class="form-group"><label>교통 카드 / 패스</label><input type="text" id="tip-transport" value="${state.tips.transport}" placeholder="예: 스이카 공항에서 발급"></div>
    <div class="form-group"><label>언어 / 번역 앱</label><input type="text" id="tip-language" value="${state.tips.language}" placeholder="예: 구글번역 카메라, 파파고"></div>
    <div class="form-group"><label>기타 팁</label><textarea id="tip-misc" placeholder="예: 콘센트 어댑터 불필요">${state.tips.misc}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="prevStep()">← 이전</button>
      <button class="btn btn-primary" onclick="saveTipsStep()">다음: 일정 자동 배치 →</button>
    </div>
  </div>`;
}
function saveTipsStep(){
  state.tips.weather=v('tip-weather'); state.tips.currency=v('tip-currency');
  state.tips.transport=v('tip-transport'); state.tips.language=v('tip-language'); state.tips.misc=v('tip-misc');
  buildSchedule(); nextStep();
}

// ═══════════════════════════════════════════════
//  STEP 4 — SCHEDULE
// ═══════════════════════════════════════════════
function renderScheduleStep() {
  const total=state.schedule.length;
  let html=`
  <div class="card">
    <div class="card-title">🗓️ 일정 배치 조정</div>
    <div class="card-desc">구역·시간대·귀국일을 분석해 자동 배치했습니다. 장소를 다른 날로 옮기거나 삭제할 수 있습니다.</div>
    <div class="warn-box">⚠️ 자동 배치 제안입니다. 실제 영업시간·예약·이동 거리를 꼭 확인하세요.</div>`;
  state.schedule.forEach((day,di) => {
    const hasRes=day.items.some(i=>i.needReservation);
    html+=`<div class="day-block"><div class="day-header"><span>${getDayLabel(day.date,di,total)}</span>
      <div style="display:flex;align-items:center;gap:8px">${hasRes?'<span class="day-note-tag">📌 예약 필요</span>':''}<button class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:white;border:none;cursor:pointer;font-family:inherit" onclick="addItemToDay(${di})">+ 추가</button></div></div>`;
    if(day.explanation?.length) html+=`<div class="day-explanation"><ul class="day-exp-list">${day.explanation.map(e=>`<li>${e}</li>`).join('')}</ul></div>`;
    if(!day.items.length) html+=`<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:13px">배치된 장소가 없습니다</div>`;
    else day.items.forEach((item,ii) => { html+=renderSchedItem(item,di,ii,total); });
    html+=`</div>`;
  });
  html+=`<div class="btn-row"><button class="btn btn-outline" onclick="prevStep()">← 이전</button><button class="btn btn-success" onclick="nextStep()">✓ 완성 일정표 보기</button></div></div>`;
  return html;
}

function renderSchedItem(item,di,ii,total){
  const mv=`${di>0?`<button class="btn btn-outline btn-xs" onclick="moveItem(${di},${ii},-1)">◀</button>`:''}${di<total-1?`<button class="btn btn-outline btn-xs" onclick="moveItem(${di},${ii},1)">▶</button>`:''}<button class="btn btn-xs" style="background:white;border:1.5px solid var(--danger);color:var(--danger)" onclick="removeItem(${di},${ii})">×</button>`;
  return `<div class="schedule-item"><div class="sched-info"><div class="sched-name">${item.name}<span class="type-badge type-${item.placeType}">${item.placeType}</span>${item.needReservation?'<span style="font-size:11px;color:#92400e;font-weight:600">📌예약</span>':''}</div><div class="sched-sub">${item.nearStation?'🚇 '+item.nearStation:''}${item.duration?' · ⏱ '+item.duration+'분':''}${item.bestTime&&item.bestTime!=='상관없음'?' · '+item.bestTime:''}</div></div><div class="sched-move">${mv}</div></div>`;
}

function moveItem(di,ii,dir){ const t=di+dir; if(t<0||t>=state.schedule.length) return; const item=state.schedule[di].items.splice(ii,1)[0]; state.schedule[t].items.push(item); render(); }
function removeItem(di,ii){ state.schedule[di].items.splice(ii,1); render(); }
function addItemToDay(dayIdx){
  const places=state.places.filter(p=>p.type!=='숙소'); if(!places.length){ alert('장소를 먼저 추가해주세요.'); return; }
  const m=document.createElement('div'); m.id='addItemModal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';
  m.innerHTML=`<div style="background:white;border-radius:14px;padding:20px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:80vh;overflow-y:auto">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">장소 선택</h3>
    <div style="display:flex;flex-direction:column;gap:6px">${places.map(p=>`<button onclick="addItemConfirm(${dayIdx},${p.id})" style="text-align:left;padding:10px;border:1.5px solid var(--gray-200);border-radius:8px;background:white;cursor:pointer;font-size:13px;font-family:inherit"><strong>${p.name}</strong> <span class="type-badge type-${p.type}">${p.type}</span><div style="font-size:11px;color:var(--gray-500);margin-top:2px">${p.zone||''} · ${p.duration}분</div></button>`).join('')}</div>
    <div style="margin-top:12px;text-align:right"><button class="btn btn-outline btn-sm" onclick="document.getElementById('addItemModal').remove()">취소</button></div>
  </div>`;
  document.body.appendChild(m);
}
function addItemConfirm(dayIdx,placeId){
  const p=state.places.find(x=>x.id===placeId); if(!p) return;
  state.schedule[dayIdx].items.push({type:'place',placeId:p.id,name:p.name,placeType:p.type,zone:p.zone,duration:p.duration,bestTime:p.bestTime,menu:p.menu,nearStation:p.nearStation,needReservation:p.needReservation,reservationMethod:p.reservationMethod,notes:p.notes});
  document.getElementById('addItemModal').remove(); render();
}

// ═══════════════════════════════════════════════
//  STEP 5 — OUTPUT
// ═══════════════════════════════════════════════
function renderOutputStep(){
  const t=state.trip, dates=dateRange(t.startDate,t.endDate), total=dates.length;
  let html=`<div class="card"><div class="card-title">📄 완성 일정표</div><div class="card-desc">${t.destination} · ${formatDate(t.startDate)} ~ ${formatDate(t.endDate)} · ${total}일</div>
  <div class="export-row">
    <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ 인쇄·PDF</button>
    <button class="btn btn-outline btn-sm" onclick="copyText()">📋 텍스트 복사</button>
    <button class="btn btn-outline btn-sm" onclick="prevStep()">← 일정 수정</button>
  </div>
  <div class="output-summary"><div class="output-summary-grid">
    ${t.accommodation?`<div>🏨 <strong>숙소</strong>: ${t.accommodation}</div>`:''}
    <div>🚌 <strong>이동수단</strong>: ${TRANSPORTS[t.transport]||t.transport}</div>
    ${t.arrivalTime?`<div>✈️ <strong>현지 도착</strong>: ${t.arrivalTime}</div>`:''}
    ${t.returnDepartureTime?`<div>🛫 <strong>귀국 출발</strong>: ${t.returnDepartureTime}</div>`:''}
  </div>${t.notes?`<div style="margin-top:8px;color:var(--gray-600);font-size:13px">📝 ${t.notes}</div>`:''}</div>`;
  state.schedule.forEach((day,di) => {
    const hasRes=day.items.some(i=>i.needReservation);
    html+=`<div class="day-block"><div class="day-header">${getDayLabel(day.date,di,total)}${hasRes?'<span class="day-note-tag">📌 예약 필요</span>':''}</div>`;
    if(!day.items.length) { html+=`<div style="padding:16px;color:var(--gray-400);font-size:13px;text-align:center">배치된 일정이 없습니다</div>`; }
    else {
      html+=`<table><thead><tr><th>시간대</th><th>장소·활동</th><th>추천 메뉴·볼거리</th><th>메모</th></tr></thead><tbody>`;
      day.items.forEach(item => {
        const blinks=item.type==='place'?getBookingLinks({name:item.name,type:item.placeType},t.destination):[];
        const linksHtml=blinks.length?`<div class="booking-links">${blinks.map(l=>`<a class="booking-btn" href="${l.url}" target="_blank" rel="noopener" style="background:${l.bg};color:${l.fg}">${l.label}</a>`).join('')}</div>`:'';
        html+=`<tr><td style="color:var(--gray-500);font-size:12px;font-weight:600;white-space:nowrap">${item.time||(item.bestTime&&item.bestTime!=='상관없음'?item.bestTime:'—')}</td>
          <td class="place-cell">${item.name} <span class="type-badge type-${item.placeType}">${item.placeType}</span>${item.needReservation?'<span style="font-size:11px;color:#92400e;font-weight:600"> 📌예약</span>':''}${item.nearStation?`<div style="font-size:11px;color:var(--gray-400);font-weight:400;margin-top:2px">🚇 ${item.nearStation}</div>`:''} ${linksHtml}</td>
          <td style="font-size:12px;color:var(--gray-600)">${item.menu||'—'}</td>
          <td style="font-size:12px;color:var(--primary)">${item.notes||''}</td></tr>`;
      });
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
  });
  const resList=state.places.filter(p=>p.needReservation);
  if(resList.length) {
    html+=`<div class="card" style="margin-top:16px"><div class="card-title" style="font-size:16px">📌 예약 체크리스트</div>
    <table style="margin-top:12px"><thead><tr><th>장소</th><th>예약 방법</th><th>예약 링크</th><th>완료</th></tr></thead><tbody>
    ${resList.map(p=>{const lks=getBookingLinks(p,t.destination); return `<tr><td class="place-cell">${p.name} <span class="type-badge type-${p.type}">${p.type}</span></td><td style="font-size:12px;color:var(--gray-600)">${p.reservationMethod||'직접 확인'}</td><td><div class="booking-links">${lks.map(l=>`<a class="booking-btn" href="${l.url}" target="_blank" rel="noopener" style="background:${l.bg};color:${l.fg}">${l.label}</a>`).join('')}</div></td><td><input type="checkbox" style="width:auto"></td></tr>`;}).join('')}
    </tbody></table></div>`;
  }
  const hasTips=Object.values(state.tips).some(v=>v.trim());
  if(hasTips) {
    html+=`<div class="card" style="margin-top:16px"><div class="card-title" style="font-size:16px">🧳 여행 준비 가이드</div><div class="tips-grid">
    ${state.tips.weather?`<div class="tip-card"><h4>🌤 날씨·복장</h4><p>${state.tips.weather}</p></div>`:''}
    ${state.tips.currency?`<div class="tip-card"><h4>💴 환율·결제</h4><p>${state.tips.currency}</p></div>`:''}
    ${state.tips.transport?`<div class="tip-card"><h4>🚇 교통카드·패스</h4><p>${state.tips.transport}</p></div>`:''}
    ${state.tips.language?`<div class="tip-card"><h4>🗣 언어·번역</h4><p>${state.tips.language}</p></div>`:''}
    ${state.tips.misc?`<div class="tip-card" style="grid-column:1/-1"><h4>💡 기타 팁</h4><p>${state.tips.misc}</p></div>`:''}
    </div></div>`;
  }
  html+=`</div>`; return html;
}

function copyText(){
  const lines=[`[${state.trip.destination} 여행 일정]`,`기간: ${formatDate(state.trip.startDate)} ~ ${formatDate(state.trip.endDate)}`,''];
  const dates=dateRange(state.trip.startDate,state.trip.endDate);
  state.schedule.forEach((day,di) => {
    lines.push(`── ${getDayLabel(day.date,di,dates.length)} ──`);
    day.items.forEach(item => lines.push(`  ${item.bestTime||item.time||''} | ${item.name} [${item.placeType}]${item.menu?' / '+item.menu:''}${item.nearStation?' 🚇'+item.nearStation:''}`));
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('클립보드에 복사되었습니다!')).catch(()=>alert('복사 실패. 직접 선택해 복사해주세요.'));
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function render(){
  renderProgress();
  const id=STEPS[state.currentStep].id, c=document.getElementById('stepContainer');
  if      (id==='intro')    c.innerHTML=renderIntroStep();
  else if (id==='trip')     c.innerHTML=renderTripStep();
  else if (id==='places')   c.innerHTML=renderPlacesStep();
  else if (id==='details')  c.innerHTML=renderDetailsStep();
  else if (id==='schedule') c.innerHTML=renderScheduleStep();
  else if (id==='output')   c.innerHTML=renderOutputStep();
}
render();
</script>
</body>
</html>
